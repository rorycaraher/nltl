{{ define "main" }}
<div
  class="relative flex h-auto min-h-screen w-full flex-col bg-[#111618] dark group/design-root overflow-x-hidden"
  style='font-family: "Space Grotesk", "Noto Sans", sans-serif;'
>
  <div class="layout-container flex h-full grow flex-col">
    {{ partial "header.html" . }}
    <div class="px-40 flex flex-1 justify-center py-5">
      <div class="layout-content-container flex flex-col max-w-[960px] flex-1">
        <div class="flex flex-wrap justify-between gap-3 p-4">
          <p class="text-white tracking-light text-[32px] font-bold leading-tight min-w-72">{{ .Title }}</p>
        </div>
        <div class="px-4 py-3 @container">
          <div class="flex overflow-hidden rounded border border-[#3b4c54] bg-[#111618]">
            <table class="flex-1">
              <thead>
                <tr class="bg-[#1b2327]">
                  <th class="table-frequency-column px-4 py-3 text-left text-white w-[400px] text-sm font-medium leading-normal">FREQUENCY</th>
                  <th class="table-duration-column px-4 py-3 text-left text-white w-[400px] text-sm font-medium leading-normal">DURATION</th>
                  <th class="table-status-column px-4 py-3 text-left text-white w-60 text-[#9cb0ba] text-sm font-medium leading-normal">STATUS</th>
                </tr>
              </thead>
              <tbody>
                {{ range .Pages.ByDate.Reverse }}
                  <tr class="border-t border-t-[#3b4c54]">
                    <td class="table-frequency-column h-[72px] px-4 py-2 w-[400px] text-[#9cb0ba] text-sm font-normal leading-normal">
                      {{ .Params.frequency | default .Title }}
                    </td>
                    <td class="table-duration-column h-[72px] px-4 py-2 w-[400px] text-[#9cb0ba] text-sm font-normal leading-normal">
                      {{ .Params.duration | default (.Date.Format "3:04") }}
                    </td>
                    <td class="table-status-column h-[72px] px-4 py-2 w-60 text-[#9cb0ba] text-sm font-bold leading-normal tracking-[0.015em]">
                      <a class="text-[#9cb0ba] hover:text-white transition" href="{{ .RelPermalink }}">
                        {{ .Params.status | default "Play" }}
                      </a>
                    </td>
                  </tr>
                {{ end }}
              </tbody>
            </table>
          </div>
          <style>
            @container (max-width: 120px) {
              .table-frequency-column {
                display: none;
              }
            }
            @container (max-width: 240px) {
              .table-duration-column {
                display: none;
              }
            }
            @container (max-width: 360px) {
              .table-status-column {
                display: none;
              }
            }
          </style>
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}
